<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Simulador de Classificação</title>
<style>
  body { font-family: Arial; padding: 20px; background: #f5f5f5; }
  textarea { width: 100%; height: 200px; }
  button { padding: 10px 20px; margin-top: 10px; }
  .resultado { margin-top: 20px; background: white; padding: 15px; }
</style>
</head>
<body>

<h2>Simulador de Classificação</h2>

<p>Cole a lista do concurso:</p>
<textarea id="entrada"></textarea>

<br>
<button onclick="processar()">Gerar Ranking</button>

<div class="resultado" id="saida"></div>

<script>
function processar() {
    const texto = document.getElementById("entrada").value;

    const regex = /([A-Za-zÀ-ÿ\s]+),\s*((?:\d+[.,]?\d*,\s*)*\d+[.,]?\d*)\s*\/\s*\d+/g;

    let lista = [];
    let match;

    while ((match = regex.exec(texto)) !== null) {
        let nome = match[1].trim();
        let notas = match[2].match(/\d+[.,]?\d*/g).map(n => parseFloat(n.replace(",", ".")));
        let notaFinal = notas[notas.length - 1];

        lista.push({ nome, nota: notaFinal });
    }

    // ordenar por nota
    lista.sort((a, b) => b.nota - a.nota);

    let resultado = "<h3>Ranking:</h3>";

    lista.forEach((c, i) => {
        resultado += `${i + 1}º - ${c.nome} (${c.nota})<br>`;
    });

    document.getElementById("saida").innerHTML = resultado;
}
</script>

</body>
</html>
